<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0825"/>
      <stop offset="100%" style="stop-color:#1e0a4a"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="150" r="220" fill="#7c3aed" opacity="0.12"/>
  <circle cx="250" cy="480" r="160" fill="#2563eb" opacity="0.10"/>

  <!-- Spin wheel icon (8-segment colorful wheel) -->
  <g transform="translate(880,315)">
    <g transform="rotate(-90)">
      <path d="M0 0 L150 0 A150 150 0 0 1 106.07 106.07 Z" fill="#7F77DD"/>
      <path d="M0 0 L106.07 106.07 A150 150 0 0 1 0 150 Z" fill="#1D9E75"/>
      <path d="M0 0 L0 150 A150 150 0 0 1 -106.07 106.07 Z" fill="#D85A30"/>
      <path d="M0 0 L-106.07 106.07 A150 150 0 0 1 -150 0 Z" fill="#D4537E"/>
      <path d="M0 0 L-150 0 A150 150 0 0 1 -106.07 -106.07 Z" fill="#378ADD"/>
      <path d="M0 0 L-106.07 -106.07 A150 150 0 0 1 0 -150 Z" fill="#EF9F27"/>
      <path d="M0 0 L0 -150 A150 150 0 0 1 106.07 -106.07 Z" fill="#639922"/>
      <path d="M0 0 L106.07 -106.07 A150 150 0 0 1 150 0 Z" fill="#F09595"/>
    </g>
    <circle cx="0" cy="0" r="150" fill="none" stroke="#1a1a1a" stroke-width="3"/>
    <circle cx="0" cy="0" r="22" fill="#ffffff" stroke="#1a1a1a" stroke-width="3"/>
    <path d="M0 -190 L-22 -150 L22 -150 Z" fill="#1a1a1a"/>
  </g>

  <!-- Pill badge -->
  <rect x="120" y="130" width="220" height="44" rx="22" fill="url(#purple)" opacity="0.9"/>
  <text x="230" y="158" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="18" fill="white">Spinmagic</text>

  <!-- Main title -->
  <text x="120" y="270" font-family="Arial Black, Arial" font-weight="900" font-size="78" fill="white">Spin &amp; SIP</text>
  <text x="120" y="360" font-family="Arial Black, Arial" font-weight="900" font-size="78" fill="url(#purple)">Money</text>

  <!-- Subtitle -->
  <text x="120" y="420" font-family="Arial" font-size="28" fill="#a78bfa">Spin the wheel. Earn tokens. Withdraw rewards.</text>

  <!-- Features row -->
  <text x="120" y="500" font-family="Arial" font-size="22" fill="#6b7280">🎡 Daily Spins</text>
  <text x="310" y="500" font-family="Arial" font-size="22" fill="#6b7280">💎 Token Rewards</text>
  <text x="530" y="500" font-family="Arial" font-size="22" fill="#6b7280">💸 Crypto Withdrawal</text>
  <text x="770" y="500" font-family="Arial" font-size="22" fill="#6b7280">🤝 Referral Bonus</text>

  <!-- Bottom URL -->
  <text x="120" y="580" font-family="Arial" font-size="20" fill="#4b5563">spinmagic.fun</text>
</svg>
